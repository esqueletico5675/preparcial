<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propietarios - Taller Mecánico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-tools"></i> Taller Mecánico</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="propietarios.html">Propietarios</a></li>
          <li class="nav-item"><a class="nav-link" href="vehiculos.html">Vehículos</a></li>
          <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
          <li class="nav-item"><a class="nav-link" href="facturas.html">Facturas</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div id="alertas"></div>

  <!-- ===================== CONTENIDO ===================== -->
  <div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2><i class="bi bi-person-fill"></i> Propietarios</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPropietario" onclick="abrirNuevo()">
        <i class="bi bi-plus-lg"></i> Nuevo propietario
      </button>
    </div>

    <!-- Filtros -->
    <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
      <div class="btn-group" role="group">
        <button class="btn btn-outline-secondary" onclick="cargarPropietarios('todos')">Todos</button>
        <button class="btn btn-outline-success" onclick="cargarPropietarios('activos')">Activos</button>
        <button class="btn btn-outline-danger" onclick="cargarPropietarios('inactivos')">Inactivos</button>
      </div>

      <div class="ms-auto" style="min-width: 260px;">
        <input
          type="text"
          class="form-control"
          id="buscador"
          placeholder="Buscar por nombre, cédula o email..."
          oninput="aplicarBusqueda()"
        />
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Celular</th>
            <th>Cédula/CC</th>
            <th>Estado</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-propietarios">
          <!-- Las filas se llenan por JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- ===================== MODAL CREAR/EDITAR ===================== -->
  <div class="modal fade" id="modalPropietario" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="form-propietario">
          <div class="modal-header">
            <h5 class="modal-title" id="tituloModal">Nuevo propietario</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="propietario-id" />

            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" id="propietario-name" required minlength="3" maxlength="64" />
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="propietario-email" required maxlength="100" />
            </div>

            <div class="mb-3">
              <label class="form-label">Celular</label>
              <input type="text" class="form-control" id="propietario-cellphone" required maxlength="15" />
            </div>

            <div class="mb-3">
              <label class="form-label">Cédula (CC)</label>
              <input type="text" class="form-control" id="propietario-cc" required maxlength="20" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/propietarios.js"></script>
</body>
</html>
