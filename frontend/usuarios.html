<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios - J.L.M DIESELCONTACT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-tools"></i> J.L.M DIESELCONTACT</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="propietarios.html">Propietarios</a></li>
          <li class="nav-item"><a class="nav-link" href="vehiculos.html">Vehículos</a></li>
          <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
          <li class="nav-item"><a class="nav-link" href="facturas.html">Facturas</a></li>
          <li class="nav-item"><a class="nav-link active" href="usuarios.html">Usuarios</a></li>
          <li class="nav-item d-flex align-items-center mx-2">
            <span class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
                  style="width: 36px; height: 36px; font-weight: bold; cursor: default;"
                  id="avatar-usuario"
                  title="">
            </span>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Salir</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div id="alertas"></div>

  <!-- ===================== CONTENIDO ===================== -->
  <div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2><i class="bi bi-people-fill"></i> Usuarios</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalUsuario" onclick="abrirNuevo()">
        <i class="bi bi-plus-lg"></i> Nuevo usuario
      </button>
    </div>

    <!-- Filtros -->
    <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
      <div class="btn-group" role="group">
        <button class="btn btn-outline-secondary btn-filtro active" data-filtro="todos" onclick="filtrarPor('todos', this)">Todos</button>
        <button class="btn btn-outline-success btn-filtro" data-filtro="activos" onclick="filtrarPor('activos', this)">Activos</button>
        <button class="btn btn-outline-danger btn-filtro" data-filtro="inactivos" onclick="filtrarPor('inactivos', this)">Inactivos</button>
      </div>

      <div class="ms-auto" style="min-width: 260px;">
        <input
          type="text"
          class="form-control"
          id="buscador"
          placeholder="Buscar por usuario..."
          oninput="aplicarBusqueda()"
        />
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Estado</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-usuarios">
          <!-- Las filas se llenan por JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- ===================== MODAL CREAR/EDITAR ===================== -->
  <div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="form-usuario">
          <div class="modal-header">
            <h5 class="modal-title" id="tituloModal">Nuevo usuario</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="usuario-id" />

            <div class="mb-3">
              <label class="form-label">Nombre de usuario</label>
              <input type="text" class="form-control" id="usuario-username" required minlength="3" maxlength="50" />
            </div>

            <div class="mb-3">
              <label class="form-label">Rol</label>
              <select class="form-select" id="usuario-role" required>
                <option value="empleado">Empleado</option>
                <option value="admin">Admin</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="usuario-password" minlength="6" maxlength="100" />
              <div id="password-hint" class="form-text d-none">Dejalo en blanco para no cambiarla</div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/session.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/usuarios.js"></script>
</body>
</html>
