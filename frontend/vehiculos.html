<div id="alertas"></div>

  <!-- ===================== CONTENIDO ===================== -->
  <div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2><i class="bi bi-car-front-fill"></i> Vehículos</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalVehiculo" onclick="abrirNuevo()">
        <i class="bi bi-plus-lg"></i> Nuevo vehículo
      </button>
    </div>

    <div class="mb-3" style="max-width: 350px;">
      <input
        type="text"
        class="form-control"
        id="buscador"
        placeholder="Buscar por placa, nombre o propietario..."
        oninput="aplicarBusqueda()"
      />
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Propietario</th>
            <th>Nombre</th>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Placa</th>
            <th>Kilómetros</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-vehiculos">
          <!-- filas por JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- ===================== MODAL CREAR/EDITAR ===================== -->
  <div class="modal fade" id="modalVehiculo" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="form-vehiculo">
          <div class="modal-header">
            <h5 class="modal-title" id="tituloModal">Nuevo vehículo</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="vehiculo-id" />

            <div class="mb-3">
              <label class="form-label">Propietario</label>
              <select class="form-select" id="vehiculo-ownerid" required>
                <option value="">Selecciona un propietario...</option>
              </select>
              <div class="form-text">¿No aparece? Créalo primero en la sección Propietarios.</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Nombre del vehículo</label>
              <input type="text" class="form-control" id="vehiculo-name" required minlength="3" maxlength="64" />
            </div>

            <div class="mb-3">
              <label class="form-label">Marca</label>
              <input type="text" class="form-control" id="vehiculo-marca" required minlength="3" maxlength="64" />
            </div>

            <div class="mb-3">
              <label class="form-label">Modelo (año)</label>
              <input type="number" class="form-control" id="vehiculo-model" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Placa</label>
              <input type="text" class="form-control" id="vehiculo-plate" required minlength="3" maxlength="7" />
            </div>

            <div class="mb-3">
              <label class="form-label">Kilómetros</label>
              <input type="number" class="form-control" id="vehiculo-kilometers" required min="0" max="99999999" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/session.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/vehiculos.js"></script>
</body>
</html>
