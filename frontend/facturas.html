<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturas - Taller Mecánico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-tools"></i> Taller Mecánico</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="propietarios.html">Propietarios</a></li>
          <li class="nav-item"><a class="nav-link" href="vehiculos.html">Vehículos</a></li>
          <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
          <li class="nav-item"><a class="nav-link active" href="facturas.html">Facturas</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div id="alertas"></div>

  <!-- ===================== CONTENIDO ===================== -->
  <div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2><i class="bi bi-receipt"></i> Facturas</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalFactura" onclick="prepararModalFactura()">
        <i class="bi bi-plus-lg"></i> Generar factura
      </button>
    </div>

    <div class="mb-3" style="max-width: 350px;">
      <input
        type="text"
        class="form-control"
        id="buscador"
        placeholder="Buscar por placa..."
        oninput="aplicarBusqueda()"
      />
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Vehículo</th>
            <th>Subtotal</th>
            <th>IVA</th>
            <th>Total</th>
            <th>Fecha</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tabla-facturas">
          <!-- filas por JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- ===================== MODAL GENERAR FACTURA ===================== -->
  <div class="modal fade" id="modalFactura" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="form-factura">
          <div class="modal-header">
            <h5 class="modal-title">Generar factura</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Servicio</label>
              <select class="form-select" id="factura-servicioid" required>
                <option value="">Selecciona un servicio...</option>
              </select>
              <div class="form-text">
                Solo aparecen servicios que aún no han sido facturados.
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Generar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/facturas.js"></script>
</body>
</html>
