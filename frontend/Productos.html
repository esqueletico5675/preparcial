<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos - Taller Mecánico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-tools"></i> J.L.M DIESELCONTACT</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="propietarios.html">Propietarios</a></li>
          <li class="nav-item"><a class="nav-link" href="vehiculos.html">Vehículos</a></li>
          <li class="nav-item"><a class="nav-link active" href="productos.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
          <li class="nav-item"><a class="nav-link" href="facturas.html">Facturas</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div id="alertas"></div>

  <!-- ===================== CONTENIDO ===================== -->
  <div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2><i class="bi bi-box-seam-fill"></i> Productos / Repuestos</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProducto" onclick="abrirNuevo()">
        <i class="bi bi-plus-lg"></i> Nuevo producto
      </button>
    </div>

    <div class="mb-3" style="max-width: 350px;">
      <input
        type="text"
        class="form-control"
        id="buscador"
        placeholder="Buscar por nombre o SKU..."
        oninput="aplicarBusqueda()"
      />
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>SKU</th>
            <th>Estado</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-productos">
          <!-- filas por JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- ===================== MODAL CREAR/EDITAR ===================== -->
  <div class="modal fade" id="modalProducto" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="form-producto">
          <div class="modal-header">
            <h5 class="modal-title" id="tituloModal">Nuevo producto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="producto-id" />

            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" id="producto-name" required minlength="2" maxlength="100" />
            </div>

            <div class="mb-3">
              <label class="form-label">Descripción</label>
              <textarea class="form-control" id="producto-description" maxlength="255"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Precio</label>
              <input type="number" class="form-control" id="producto-price" required min="0.01" step="0.01" />
            </div>

            <div class="mb-3">
              <label class="form-label">Stock</label>
              <input type="number" class="form-control" id="producto-stock" required min="0" />
            </div>

            <div class="mb-3">
              <label class="form-label">SKU (código)</label>
              <input type="text" class="form-control" id="producto-sku" maxlength="30" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/productos.js"></script>
</body>
</html>
